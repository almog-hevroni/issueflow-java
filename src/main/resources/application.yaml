server:
  port: 8080

spring:
  profiles:
    default: local
  application:
    name: issueflow
  config:
    import: optional:classpath:application-local.yaml
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

issueflow:
  security:
    jwt:
      secret: ${ISSUEFLOW_SECURITY_JWT_SECRET:change-this-secret-in-production-at-least-32-chars}
      expiration-seconds: 3600
