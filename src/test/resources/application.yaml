server:
  port: 0

spring:
  profiles:
    active: test
  application:
    name: issueflow
  datasource:
    url: jdbc:h2:mem:db;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driverClassName: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

issueflow:
  security:
    jwt:
      secret: "test-secret-key-test-secret-key-32chars"
      expiration-seconds: 3600
